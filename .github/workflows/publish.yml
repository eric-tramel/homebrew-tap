name: brew pr-pull

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number
        required: true
      head_sha:
        description: Expected pull request head commit SHA (optional)
  workflow_run:
    workflows: ["brew test-bot"]
    types: [completed]

concurrency:
  group: pr-pull
  cancel-in-progress: false

jobs:
  pr-pull:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request' &&
       startsWith(github.event.workflow_run.head_branch, 'bump-arx-'))
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR: ${{ inputs.pull_request }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$INPUT_PR" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pr_json="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$HEAD_BRANCH" --state open --json number,isDraft --jq '.[0]')"
          if [ -z "$pr_json" ] || [ "$pr_json" = "null" ]; then
            echo "No open pull request for branch $HEAD_BRANCH; nothing to publish." >> "$GITHUB_STEP_SUMMARY"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(echo "$pr_json" | jq -r .isDraft)" = "true" ]; then
            echo "Pull request for $HEAD_BRANCH is a draft (validation run); skipping publish." >> "$GITHUB_STEP_SUMMARY"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$(echo "$pr_json" | jq -r .number)" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        if: steps.pr.outputs.publish == 'true'
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        if: steps.pr.outputs.publish == 'true'
        uses: Homebrew/actions/git-user-config@main

      - name: Pull and publish bottles
        if: steps.pr.outputs.publish == 'true'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PULL_REQUEST: ${{ steps.pr.outputs.number }}
        run: |
          if [[ -n "${HEAD_SHA:-}" ]]
          then
            brew pr-pull --debug --tap="$GITHUB_REPOSITORY" --head-sha="$HEAD_SHA" "$PULL_REQUEST"
          else
            brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"
          fi

      - name: Push commits
        if: steps.pr.outputs.publish == 'true'
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main
